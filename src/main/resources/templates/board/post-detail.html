<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메인 화면</title>
    <link rel="stylesheet" href="/css/board/post-detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script defer src="/js/board/post-detail.js"></script>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="tabs-container" th:if="${categoryTitle} != 'review'">
        <div class="tabs">
            <a class="tab-button" th:href="@{'/' + ${categoryTitle} + '/musical'}"
               th:classappend="${postCategoryTitle == 'musical'} ? ' selected'">
                <p>뮤지컬</p>
            </a>
            <a class="tab-button" th:href="@{'/' + ${categoryTitle} + '/concert'}"
               th:classappend="${postCategoryTitle == 'concert'} ? ' selected'">
                <p>콘서트</p>
            </a>
            <a class="tab-button" th:href="@{'/' + ${categoryTitle} + '/theater'}"
               th:classappend="${postCategoryTitle == 'theater'} ? ' selected'">
                <p>연극</p>
            </a>
            <a class="tab-button" th:href="@{'/' + ${categoryTitle} + '/etc'}"
               th:classappend="${postCategoryTitle == 'etc'} ? ' selected'">
                <p>기타</p>
            </a>
        </div>
    </div>

    <div class="review-block" th:if="${categoryTitle} == 'review'"></div>

    <div class="button-group">
        <button class="nav-button">이전 글</button>
        <button class="nav-button">다음 글</button>
        <button class="nav-button">목록</button>
    </div>

    <div class="post-container">
        <h2 th:text="'[' + ${postCategoryTitle} + '] ' + ${post.title}"></h2>
        <div class="post-info">
            <img src="/images/logo.png" class="profile-img" alt="프로필 이미지">
            <div>
                <div class="author-row">
                    <span class="author" th:text="${post?.nickname}"></span>
                    <button class="chat-button" th:if="${user?.isPresent()} and ${post?.nickname != user.get().nickname}">1:1 채팅</button>
                    <button class="chat-button" th:if="${user?.isPresent()} and ${post?.nickname == user.get().nickname}"
                            th:href="@{|/${categoryTitle}/${postCategoryTitle}/${post.id}/edit|}"
                            onclick="location.href=this.getAttribute('href');">
                        수정
                    </button>

                    <form th:action="@{|/${categoryTitle}/${postCategoryTitle}/${post.id}/delete|}" method="post" th:if="${user?.isPresent()} and ${post?.nickname == user.get().nickname}">
                        <button type="submit" class="chat-button" onclick="return confirmDelete()">삭제</button>
                    </form>


                </div>
                <div class="date-row">
                    <span class="date" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    <span class="views" th:text="${post.viewCount}"></span>
                </div>
            </div>
        </div>

        <div class="post-body">
            <img src="/images/logo.png" class="post-image">
            <div class="post-text">
                <p th:text="${post.content}"></p>
            </div>
        </div>

        <div class="interaction">
            <i class="like-icon far fa-heart" id="like-icon"
               th:data-post-id="${post.id}"
               th:data-category-title="${categoryTitle}"
               th:data-user="${user}"
               onclick="toggleLike(this)"></i>
            <span id="like-count" th:text="${post.likeCount}"></span>
            <span th:text="'댓글 '+ ${post.commentCount}"></span>
        </div>

        <div class="sort-buttons">
            <button class="sort-button">등록순</button>
            <button class="sort-button">최신순</button>
        </div>

        <div class="comments" th:each="comment : ${post.comments}">
            <div class="comment">
                <div class="comment-content">
                    <div class="comment-header">
                        <img src="/images/logo.png" class="profile-img" alt="프로필 이미지">
                        <div>
                            <p class="author" th:text="${comment.user.nickname}"></p>
                            <p class="date" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></p>
                        </div>
                    </div>
                    <div class="comment-options">...</div>
                </div>
                <p th:text="${comment.content}"></p>
            </div>
        </div>
    </div>

    <div id='wrapper'></div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    function confirmDelete() {
        return confirm("정말 삭제하시겠습니까?");
    }

    document.addEventListener("DOMContentLoaded", async function() {
        const likeIcon = document.getElementById('like-icon');
        const postId = likeIcon.getAttribute('data-post-id');
        const categoryTitle = likeIcon.getAttribute('data-category-title');
        const user = likeIcon.getAttribute('data-user');

        if (user != null) {
            try {
                const response = await fetch(`/api/${categoryTitle}/like/status/${postId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    likeIcon.classList.toggle('fas', data.liked);
                    likeIcon.classList.toggle('far', !data.liked);
                } else {
                    console.error('Failed to get like status');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
    });

    async function toggleLike(button) {
        const postId = button.getAttribute('data-post-id');
        const categoryTitle = button.getAttribute('data-category-title');
        const user = button.getAttribute('data-user');

        if (user == null) {
            window.location.href = '/loginform';
            return;
        }

        const likeIcon = document.getElementById('like-icon');
        const likeCountSpan = document.getElementById('like-count');
        let liked = !likeIcon.classList.contains('fas');

        if (liked) {
            likeIcon.classList.add('fas');
            likeIcon.classList.remove('far');
            likeCountSpan.textContent = (parseInt(likeCountSpan.textContent) + 1).toString();
        } else {
            likeIcon.classList.remove('fas');
            likeIcon.classList.add('far');
            likeCountSpan.textContent = (parseInt(likeCountSpan.textContent) - 1).toString();
        }

        await fetch(`/api/${categoryTitle}/like/${postId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ liked })
        });
    }
</script>
</body>
</html>
